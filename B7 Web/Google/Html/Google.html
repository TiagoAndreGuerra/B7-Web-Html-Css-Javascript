<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="../Css/Google.css">
</head>
<body>
    <!-- Header com navegação -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-links">
                <a href="#gmail">Gmail</a>
                <a href="#images">Imagens</a>
            </div>
            <div class="nav-icons">
                <a href="#signin" class="signin-btn">Fazer login</a>
            </div>
        </nav>
    </header>

    <!-- Seção Principal -->
    <main class="main-container">
        <div class="logo-section">
            <div class="logo">Google</div>
        </div>

        <!-- Barra de Pesquisa -->
        <div class="search-section">
            <form class="search-form">
                <div class="search-box">
                    <input type="text" class="search-input" placeholder="Pesquisar no Google">
                </div>
                <div class="search-buttons">
                    <button type="submit" class="btn">Pesquisa Google</button>
                    <button type="button" class="btn">Estou com sorte</button>
                </div>
            </form>
            <div class="language">
                <p>Oferecido pelo Google em: <a href="#">português</a></p>
            </div>
        </div>
    </main>

    <!-- Rodapé -->
    <footer class="footer">
        <div class="footer-top">
            <a href="#carbon">Compensar sua pegada de carbono</a>
        </div>
        <div class="footer-content">
            <div class="footer-left">
                <a href="#about">Sobre</a>
                <a href="#advertising">Publicidade</a>
                <a href="#business">Negócios</a>
                <a href="#howitworks">Como funciona</a>
            </div>
            <div class="footer-right">
                <a href="#privacy">Privacidade</a>
                <a href="#terms">Termos</a>
                <a href="#settings">Configurações</a>
            </div>
        </div>
    </footer>
</body>
</html>
