<!--Texto Para Programadores--> 
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="description" content="Formulario" />
  <meta name="author" content="Tiago Andre Guerra" />
  <title>Formulario</title>
  <link rel="icon" href="../Assets/Cursor.png" />
  <link rel="stylesheet" href="../Css/Formulario.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" />
</head>
<body>
  <h1>Formulário de Contato</h1>
  <form action="#" method="post">
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" required maxlength="100"><br><br>
    <label for="sobrenome">Sobrenome:</label>
    <input type="text" id="sobrenome" name="sobrenome" required maxlength="100"><br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required maxlength="100" pattern=".*@.*" title="O email deve conter o símbolo @"><br><br>
    <label for="telefone">Telefone Celular:</label>
    <input type="tel" id="telefone" name="telefone" required pattern="[0-9]{11}" title="O telefone deve ter exatamente 11 dígitos numéricos"><br><br>
    <label for="data_nascimento">Data de Nascimento:</label>
    <input type="date" id="data_nascimento" name="data_nascimento" pattern="\d{4}-\d{2}-\d{2}" min="1900-01-01" required><br><br>
    <label for="genero">Gênero:</label>
    <select id="genero" name="genero" required>
      <option value="">Selecione</option>
      <option value="masculino">Masculino</option>
      <option value="feminino">Feminino</option>
      <option value="outro">Outro</option>
    </select><br><br>
    <label for="endereco">Endereço:</label>
    <input type="text" id="endereco" name="endereco" required maxlength="200"><br><br>
    <label for="cidade">Cidade:</label>
    <input type="text" id="cidade" name="cidade" required maxlength="100"><br><br>
    <label for="estado">Estado:</label>
    <input type="text" id="estado" name="estado" required maxlength="100"><br><br>
    <label for="mensagem">Mensagem:</label>
    <textarea id="mensagem" name="mensagem" rows="12" cols="50" maxlength="1000"></textarea><br><br>
    <input type="submit" value="Enviar">
  </form>
  <script src="../Javascript/Formulario.js"></script>
</body>
</html>
